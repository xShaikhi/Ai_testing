<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="80" fill="#1a1a2e"/>
  <!-- Ground -->
  <rect x="0" y="380" width="512" height="20" fill="#4ade80"/>
  <!-- Player (character) -->
  <rect x="80" y="310" width="60" height="70" rx="8" fill="#60a5fa"/>
  <!-- Head -->
  <circle cx="110" cy="295" r="25" fill="#fbbf24"/>
  <!-- Obstacle -->
  <rect x="340" y="330" width="40" height="50" rx="4" fill="#f87171"/>
  <!-- Coins -->
  <circle cx="220" cy="320" r="15" fill="#fbbf24"/>
  <circle cx="260" cy="300" r="15" fill="#fbbf24"/>
  <circle cx="300" cy="310" r="15" fill="#fbbf24"/>
  <!-- Star sparkle on coins -->
  <text x="213" y="326" font-size="16" fill="#92400e">$</text>
  <text x="253" y="306" font-size="16" fill="#92400e">$</text>
  <text x="293" y="316" font-size="16" fill="#92400e">$</text>
  <!-- Title -->
  <text x="256" y="460" font-family="Arial" font-size="40" font-weight="bold" fill="#ffffff" text-anchor="middle">RUNNER</text>
</svg>
